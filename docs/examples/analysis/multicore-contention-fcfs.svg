<svg xmlns="http://www.w3.org/2000/svg" width="760" height="356" viewBox="0 0 760 356" role="img" aria-labelledby="title desc">
<style>
.title{font:700 20px sans-serif;fill:#111827;}
.subtitle,.axis,.legend,.label,.value{font:12px monospace;fill:#374151;}
.waiting{fill:#2563eb;}
.turnaround{fill:#f59e0b;}
.grid{stroke:#e5e7eb;stroke-width:1;}
.baseline{stroke:#9ca3af;stroke-width:1;}
</style>
<title id="title">zig-scheduler waiting vs turnaround analysis</title>
<desc id="desc">Deterministic SVG derived from exported zig-scheduler/report JSON.</desc>
<text class="title" x="24" y="32">Analysis: waiting vs turnaround time</text>
<text class="subtitle" x="24" y="52">multicore-contention · FCFS · contract v1</text>
<rect x="24" y="62" width="12" height="12" class="waiting"/><text class="legend" x="42" y="72">waiting_time</text>
<rect x="160" y="62" width="12" height="12" class="turnaround"/><text class="legend" x="178" y="72">turnaround_time</text>
<line class="grid" x1="180" y1="84" x2="180" y2="284"/>
<text class="axis" x="180" y="308" text-anchor="middle">0</text>
<line class="grid" x1="258" y1="84" x2="258" y2="284"/>
<text class="axis" x="258" y="308" text-anchor="middle">1</text>
<line class="grid" x1="414" y1="84" x2="414" y2="284"/>
<text class="axis" x="414" y="308" text-anchor="middle">3</text>
<line class="grid" x1="571" y1="84" x2="571" y2="284"/>
<text class="axis" x="571" y="308" text-anchor="middle">5</text>
<line class="grid" x1="728" y1="84" x2="728" y2="284"/>
<text class="axis" x="728" y="308" text-anchor="middle">7</text>
<line class="baseline" x1="180" y1="284" x2="728" y2="284"/>
<text class="label" x="168" y="100" text-anchor="end">A</text>
<text class="label" x="168" y="114" text-anchor="end">wait/turn</text>
<rect class="waiting" x="180" y="92" width="0" height="10" rx="2"/>
<rect class="turnaround" x="180" y="106" width="391" height="10" rx="2"/>
<text class="value" x="736" y="102">0 / 5</text>
<text class="label" x="168" y="144" text-anchor="end">B</text>
<text class="label" x="168" y="158" text-anchor="end">wait/turn</text>
<rect class="waiting" x="180" y="136" width="0" height="10" rx="2"/>
<rect class="turnaround" x="180" y="150" width="313" height="10" rx="2"/>
<text class="value" x="736" y="146">0 / 4</text>
<text class="label" x="168" y="188" text-anchor="end">C</text>
<text class="label" x="168" y="202" text-anchor="end">wait/turn</text>
<rect class="waiting" x="180" y="180" width="313" height="10" rx="2"/>
<rect class="turnaround" x="180" y="194" width="548" height="10" rx="2"/>
<text class="value" x="736" y="190">4 / 7</text>
<text class="label" x="168" y="232" text-anchor="end">D</text>
<text class="label" x="168" y="246" text-anchor="end">wait/turn</text>
<rect class="waiting" x="180" y="224" width="234" height="10" rx="2"/>
<rect class="turnaround" x="180" y="238" width="391" height="10" rx="2"/>
<text class="value" x="736" y="234">3 / 5</text>
</svg>
