name: cpp-ci

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'include/**'
      - 'tests/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'flake.nix'
      - 'flake.lock'
      - 'nix/**'
      - '.clang-format'
      - '.github/workflows/cpp-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'include/**'
      - 'tests/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'flake.nix'
      - 'flake.lock'
      - 'nix/**'
      - '.clang-format'
      - '.github/workflows/cpp-ci.yml'

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build-and-test:
    name: cmake + ninja + bear + ctest + clang-format
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cache Nix store
        uses: cachix/cachix-action@v16
        with:
          name: xsprof
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        continue-on-error: true

      - name: Configure (cmake + Ninja)
        run: nix develop --command bash -c 'cmake -S . -B build -G Ninja'

      - name: Build (bear + ninja)
        run: nix develop --command bash -c 'bear -- cmake --build build -j$(nproc)'

      - name: Verify compile_commands.json
        run: |
          test -f build/compile_commands.json
          echo "compile_commands.json generated by bear ($(wc -l < build/compile_commands.json) lines)"

      - name: Test (ctest)
        run: nix develop --command bash -c 'ctest --test-dir build --output-on-failure'

      - name: clang-format check
        run: |
          nix develop --command bash -c '
            set -euo pipefail
            FAIL=0
            while IFS= read -r -d "" f; do
              if ! clang-format --dry-run --Werror "$f" 2>/dev/null; then
                echo "FORMAT FAIL: $f"
                FAIL=1
              fi
            done < <(find src include tests -name "*.cpp" -o -name "*.hpp" -o -name "*.h" | grep -v bpf/vmlinux.h | sort -z)
            if [ "$FAIL" -ne 0 ]; then
              echo "clang-format check failed. Run: nix develop --command bash -c \"find src include tests -name \\\"*.cpp\\\" -o -name \\\"*.hpp\\\" | grep -v bpf/vmlinux.h | xargs clang-format -i\""
              exit 1
            fi
            echo "clang-format check passed"
          '
