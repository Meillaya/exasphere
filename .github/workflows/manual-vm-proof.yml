name: manual-vm-proof

on:
  workflow_dispatch:
    inputs:
      audit_id:
        description: "Explicit audit ID for this protected VM proof run."
        required: true
        type: string
      rollback_id:
        description: "Rollback ID that must appear in rollback proof artifacts."
        required: true
        type: string
      vm_marker_path:
        description: "Pinned guest marker path; keep /run/zig-scheduler-vm-lab.marker."
        required: true
        default: /run/zig-scheduler-vm-lab.marker
        type: string
      supported_tuple:
        description: "Supported tuple from docs/releases/supported-kernel-tuples.md."
        required: true
        type: string
      confirm_vm_only:
        description: "Operator confirmation: disposable VM-only proof; no host attach."
        required: true
        type: string
      approval_ack:
        description: "Operator acknowledgement: manual protected VM proof only; not release approval."
        required: true
        type: string

permissions:
  contents: read
  actions: read
  id-token: write
  attestations: write

defaults:
  run:
    shell: bash

jobs:
  vm-proof:
    name: reviewer-gated disposable VM proof
    environment: vm-proof-manual
    runs-on: [self-hosted, zig-scheduler-vm-proof, disposable-vm]
    timeout-minutes: 120
    env:
      VM_PROOF_BUNDLE: evidence/lab/manual-vm-proof-bundle/vm-proof-bundle.tar.zst
      ZIG_SCHEDULER_RUN_PRIVILEGED_VM: "1"
      ZIG_SCHEDULER_VM_MARKER_PATH: /run/zig-scheduler-vm-lab.marker
      ZIG_SCHEDULER_RELEASE_ELIGIBLE: "false"
      ZIG_SCHEDULER_PRODUCTION_CAPACITY_CLAIM: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Refuse non-manual or unacknowledged run
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_AUDIT_ID: ${{ inputs.audit_id }}
          INPUT_ROLLBACK_ID: ${{ inputs.rollback_id }}
          INPUT_VM_MARKER_PATH: ${{ inputs.vm_marker_path }}
          INPUT_SUPPORTED_TUPLE: ${{ inputs.supported_tuple }}
          INPUT_CONFIRM_VM_ONLY: ${{ inputs.confirm_vm_only }}
          INPUT_APPROVAL_ACK: ${{ inputs.approval_ack }}
        run: |
          set -euo pipefail
          test "$EVENT_NAME" = workflow_dispatch
          test "$INPUT_VM_MARKER_PATH" = /run/zig-scheduler-vm-lab.marker
          [[ "$INPUT_AUDIT_ID" =~ ^AUD-[0-9]{8}T[0-9]{6}Z-[a-f0-9]{7,12}-[a-f0-9]{6}$ ]]
          [[ "$INPUT_ROLLBACK_ID" =~ ^RB-[A-Za-z0-9][A-Za-z0-9._-]{0,127}$ ]]
          [[ "$INPUT_SUPPORTED_TUPLE" =~ ^linux-(6\.(1[2-9]|[2-9][0-9])([.][0-9]+)?|7\.1\.1-2-cachyos)-x86_64-sched_ext-bpf-bpf_jit-btf-vm_lab_only$ ]]
          test "$INPUT_CONFIRM_VM_ONLY" = "disposable VM-only proof; no host attach"
          test "$INPUT_APPROVAL_ACK" = "manual protected VM proof only; not release approval"

      - name: Static safety gates before VM work
        run: |
          set -euo pipefail
          python3 qa/manual_vm_proof_ci_check.py \
            --workflow .github/workflows/manual-vm-proof.yml \
            --docs docs/ci.md docs/runbooks/vm-lab.md docs/releases/governance-gate.md docs/security/review-checklist.md
          python3 qa/protected_environment_review_check.py --self-test
          python3 qa/runner_substrate_proof_check.py --self-test
          bash qa/no_host_mutation.sh
          bash qa/no_frontend_root.sh
          bash qa/release_gate.sh --self-test

      - name: Run isolated disposable VM proof surface
        run: |
          set -euo pipefail
          rm -rf evidence/lab/manual-vm-proof evidence/lab/matrix/manual-vm-proof
          mkdir -p evidence/lab/manual-vm-proof/static-logs
          zig build bpf --summary all 2>&1 | tee evidence/lab/manual-vm-proof/static-logs/bpf-build.log
          set +e
          zig build vm-harness-matrix --summary all -- \
            --mode vm-required \
            --suite protected-core \
            --out evidence/lab/matrix/manual-vm-proof \
            2>&1 | tee evidence/lab/manual-vm-proof/static-logs/vm-harness-matrix.log
          matrix_rc=${PIPESTATUS[0]}
          set -e
          printf 'vm-harness-matrix exit code: %s\n' "$matrix_rc" | tee evidence/lab/manual-vm-proof/static-logs/vm-harness-matrix-exit-code.log
          python3 qa/matrix_run_contract_check.py \
            --manifest evidence/lab/matrix/manual-vm-proof/manifest.json \
            --schemas schemas/control \
            --docs docs/control \
            2>&1 | tee evidence/lab/manual-vm-proof/static-logs/matrix-contract.log
          if [ "$matrix_rc" -ne 0 ]; then
            grep -R '"outcome"[[:space:]]*:[[:space:]]*"REFUSE"\|"outcome"[[:space:]]*:[[:space:]]*"SKIP"\|"outcome"[[:space:]]*:[[:space:]]*"INCIDENT"\|"outcome"[[:space:]]*:[[:space:]]*"FAIL"' evidence/lab/matrix/manual-vm-proof/rows >/dev/null
            grep -R '"reason"[[:space:]]*:[[:space:]]*"[^"]' evidence/lab/matrix/manual-vm-proof >/dev/null
          fi

      - name: Assert required proof provenance files
        env:
          INPUT_AUDIT_ID: ${{ inputs.audit_id }}
          INPUT_ROLLBACK_ID: ${{ inputs.rollback_id }}
          INPUT_SUPPORTED_TUPLE: ${{ inputs.supported_tuple }}
        run: |
          set -euo pipefail
          {
            printf '%s\n' 'Required proof contract for vm-proof-bundle.tar.zst:'
            printf '%s%s\n' '- audit id: ' "$INPUT_AUDIT_ID"
            printf '%s%s\n' '- rollback id: ' "$INPUT_ROLLBACK_ID"
            printf '%s\n' '- VM marker: /run/zig-scheduler-vm-lab.marker'
            printf '%s%s\n' '- supported tuple: ' "$INPUT_SUPPORTED_TUPLE"
            printf '%s\n' '- matrix manifest: evidence/lab/matrix/manual-vm-proof/manifest.json'
            printf '%s\n' '- matrix rows: evidence/lab/matrix/manual-vm-proof/rows/*/matrix-run.json'
            printf '%s\n' '- protected-core suite: live-backend, workload-cpu-saturation, workload-cgroup-weight-quota, and exactly one latency/churn row (workload-interactive-latency or workload-scheduler-affinity-churn)'
            printf '%s\n' '- BPF metadata: zig-out/bpf/zigsched_minimal.bpf.meta.json'
            printf '%s\n' '- BPF SKIP JSON: zig-out/bpf/zigsched_minimal.bpf.skip.json when object metadata is unavailable'
            printf '%s\n' '- daemon events: per-row daemon-events.jsonl or explicit SKIP/REFUSE evidence'
            printf '%s\n' '- live summary: live summary if present; absence is not approval'
            printf '%s\n' '- pre state and post state: sched_ext state captured inside the disposable VM only'
            printf '%s\n' '- rollback proof: rollback-proof.json artifacts'
            printf '%s\n' '- cleanup proof: cleanup-proof.json artifacts'
            printf '%s\n' '- host refusal: host-refusal.json artifacts'
            printf '%s\n' '- static verification logs: evidence/lab/manual-vm-proof/static-logs/*.log'
            printf '%s\n' '- benchmark provenance: benchmark_provenance records for calibrated matrix rows when applicable'
            printf '%s\n' '- protected environment review: protected-environment-review.json with approved vm-proof-manual reviewer, exact non-release acknowledgement, run URL, and no release/production claim'
            printf '%s\n' '- runner substrate proof: runner-substrate-proof.json with runner class, runner group, runner labels, protected environment reviewer, run URL, QEMU path, QEMU version, /dev/kvm status, accel mode, kernel tuple, BPF metadata, attestation status, and unavailable reasons'
            printf '%s\n' '- runner cleanliness proof: runner-cleanliness-proof.json with JIT config or clean-machine boot/run identity, no-reuse evidence, removal receipt, run URL, and links to protected review plus runner substrate proof; labels alone are not cleanliness proof'
            printf '%s\n' '- evidence manifest: evidence/lab/manual-vm-proof/evidence-manifest.json with SHA-256 hashes, schema roles, and attestation status'
            printf '%s\n' '- host_mutation=false'
            printf '%s\n' '- release_eligible=false'
            printf '%s\n' '- production_capacity_claim=false'
          } > evidence/lab/manual-vm-proof/provenance-requirements.txt
          test -f evidence/lab/matrix/manual-vm-proof/manifest.json
          find evidence/lab/matrix/manual-vm-proof/rows -name matrix-run.json -print -quit | grep -q .
          test -f evidence/lab/matrix/manual-vm-proof/rows/live-backend/matrix-run.json
          test -f evidence/lab/matrix/manual-vm-proof/rows/workload-cpu-saturation/matrix-run.json
          test -f evidence/lab/matrix/manual-vm-proof/rows/workload-cgroup-weight-quota/matrix-run.json
          latency_rows=0
          [ -f evidence/lab/matrix/manual-vm-proof/rows/workload-interactive-latency/matrix-run.json ] && latency_rows=$((latency_rows + 1))
          [ -f evidence/lab/matrix/manual-vm-proof/rows/workload-scheduler-affinity-churn/matrix-run.json ] && latency_rows=$((latency_rows + 1))
          test "$latency_rows" -eq 1
          if [ ! -f zig-out/bpf/zigsched_minimal.bpf.meta.json ] && [ ! -f zig-out/bpf/zigsched_minimal.bpf.skip.json ]; then
            echo "missing BPF metadata or SKIP JSON" >&2
            exit 1
          fi
          grep -R '"host_mutation"[[:space:]]*:[[:space:]]*false' evidence/lab/matrix/manual-vm-proof >/dev/null
          grep -R '"release_eligible"[[:space:]]*:[[:space:]]*false' evidence/lab/matrix/manual-vm-proof >/dev/null
          grep -R 'rollback' evidence/lab/matrix/manual-vm-proof >/dev/null
          grep -R 'cleanup' evidence/lab/matrix/manual-vm-proof >/dev/null
          grep -R 'host.refusal\|host-refusal\|host_refusal' evidence/lab/matrix/manual-vm-proof >/dev/null

      - name: Capture protected environment review evidence
        env:
          REQUIRED_APPROVAL_COMMENT: manual protected VM proof only; not release approval
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from datetime import UTC, datetime
          from pathlib import Path
          import json
          import os
          import urllib.error
          import urllib.request

          out = Path('evidence/lab/manual-vm-proof/protected-environment-review.json')
          run_id = os.environ['GITHUB_RUN_ID']
          repository = os.environ['GITHUB_REPOSITORY']
          api_url = f'https://api.github.com/repos/{repository}/actions/runs/{run_id}/approvals'
          run_url = os.environ.get('GITHUB_SERVER_URL', 'https://github.com') + '/' + repository + '/actions/runs/' + run_id
          token = os.environ['GITHUB_TOKEN']
          required_comment = os.environ['REQUIRED_APPROVAL_COMMENT']
          request = urllib.request.Request(
              api_url,
              headers={
                  'Accept': 'application/vnd.github+json',
                  'Authorization': 'Bearer ' + token,
                  'User-Agent': 'zig-scheduler-manual-vm-proof',
                  'X-GitHub-Api-Version': '2022-11-28',
              },
              method='GET',
          )
          try:
              with urllib.request.urlopen(request, timeout=30) as response:
                  raw = response.read()
          except urllib.error.URLError as exc:
              raise SystemExit(f'protected review API request failed without exposing token: {exc}') from exc
          payload = json.loads(raw)
          if not isinstance(payload, list):
              raise SystemExit('protected review API response must be a JSON array')

          selected = None
          selected_environment = None
          for row in payload:
              if not isinstance(row, dict):
                  raise SystemExit('protected review API response row must be an object')
              environments = row.get('environments')
              if not isinstance(environments, list):
                  raise SystemExit('protected review API response row environments must be an array')
              matching_environment = None
              for environment in environments:
                  if not isinstance(environment, dict):
                      raise SystemExit('protected review API response environment must be an object')
                  if environment.get('name') == 'vm-proof-manual':
                      matching_environment = environment
              if row.get('state') == 'approved' and row.get('comment') == required_comment and matching_environment is not None:
                  selected = row
                  selected_environment = matching_environment

          if selected is None or selected_environment is None:
              raise SystemExit('no approved vm-proof-manual review with exact non-release acknowledgement was found')
          user = selected.get('user')
          if not isinstance(user, dict):
              raise SystemExit('selected protected review row is missing user object')
          normalized = {
              'schema': 'zig-scheduler/protected-environment-review/v1',
              'run_id': run_id,
              'run_url': run_url,
              'head_sha': os.environ['GITHUB_SHA'],
              'environment_name': 'vm-proof-manual',
              'environment_id': selected_environment.get('id'),
              'reviewer_status': 'approved',
              'reviewer_identity': user.get('login'),
              'reviewer_id': user.get('id'),
              'comment': required_comment,
              'review_history_api_url': api_url,
              'collected_at': datetime.now(UTC).strftime('%Y-%m-%dT%H:%M:%SZ'),
              'host_mutation': False,
              'release_eligible': False,
              'production_capacity_claim': False,
          }
          out.write_text(json.dumps(normalized, indent=2, sort_keys=True) + '\n')
          PY
          python3 qa/protected_environment_review_check.py \
            --proof evidence/lab/manual-vm-proof/protected-environment-review.json \
            --schema schemas/control/protected-environment-review.v1.schema.json

      - name: Capture protected runner substrate proof
        env:
          INPUT_SUPPORTED_TUPLE: ${{ inputs.supported_tuple }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import hashlib
          import json
          import os
          import subprocess

          out = Path('evidence/lab/manual-vm-proof/runner-substrate-proof.json')
          reviewer_evidence = Path('evidence/lab/manual-vm-proof/protected-environment-review.json')
          bpf_meta = Path('zig-out/bpf/zigsched_minimal.bpf.meta.json')
          bpf_skip = Path('zig-out/bpf/zigsched_minimal.bpf.skip.json')
          bpf_path = bpf_meta if bpf_meta.exists() else bpf_skip
          bpf_role = 'bpf-metadata' if bpf_meta.exists() else 'bpf-skip-json'
          run_url = os.environ.get('GITHUB_SERVER_URL', 'https://github.com') + '/' + os.environ['GITHUB_REPOSITORY'] + '/actions/runs/' + os.environ['GITHUB_RUN_ID']

          def digest(path):
              return hashlib.sha256(path.read_bytes()).hexdigest()

          def kernel_config_bytes(release):
              boot_config = Path('/boot') / ('config-' + release)
              if boot_config.is_file():
                  return boot_config.read_bytes()
              proc_config = Path('/proc/config.gz')
              if proc_config.is_file():
                  import gzip
                  return gzip.decompress(proc_config.read_bytes())
              return b''

          def release_prefix(supported_tuple):
              prefix = 'linux-'
              suffix = '-x86_64-sched_ext-bpf-bpf_jit-btf-vm_lab_only'
              if supported_tuple.startswith(prefix) and supported_tuple.endswith(suffix):
                  return supported_tuple[len(prefix):-len(suffix)]
              return ''

          def load_reviewer_signal(path, expected_run_url):
              if not path.is_file():
                  return {
                      'reviewer_status': 'not_exposed_by_github_actions_runtime',
                      'unavailable_reason': 'normalized protected-environment-review.json is missing; cannot claim PASS',
                  }
              review = json.loads(path.read_text())
              expected_api_url = 'https://api.github.com/repos/' + os.environ['GITHUB_REPOSITORY'] + '/actions/runs/' + os.environ['GITHUB_RUN_ID'] + '/approvals'
              if (
                  review.get('reviewer_status') != 'approved'
                  or review.get('run_url') != expected_run_url
                  or review.get('review_history_api_url') != expected_api_url
                  or review.get('environment_name') != 'vm-proof-manual'
                  or review.get('comment') != 'manual protected VM proof only; not release approval'
                  or not review.get('reviewer_identity')
                  or review.get('host_mutation') is not False
                  or review.get('release_eligible') is not False
                  or review.get('production_capacity_claim') is not False
              ):
                  return {
                      'reviewer_status': 'unavailable',
                      'unavailable_reason': 'normalized protected-environment-review.json is missing approved reviewer identity for this run URL and acknowledgement',
                  }
              return {
                  'reviewer_status': 'approved',
                  'reviewer_identity': str(review['reviewer_identity']),
              }

          qemu_result = subprocess.run(['bash', '-lc', 'command -v qemu-system-x86_64'], check=False, stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True)
          qemu_abs = qemu_result.stdout.strip()
          qemu_available = qemu_result.returncode == 0 and qemu_abs != ''
          qemu_version = ''
          qemu_supports_kvm = False
          qemu_unavailable_reason = 'qemu-system-x86_64 not found in PATH'
          if qemu_available:
              version_result = subprocess.run([qemu_abs, '--version'], check=False, stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True)
              qemu_version = version_result.stdout.splitlines()[0] if version_result.stdout.splitlines() else ''
              if qemu_version == '':
                  qemu_unavailable_reason = 'qemu-system-x86_64 version unavailable'
              else:
                  accel_result = subprocess.run([qemu_abs, '-accel', 'help'], check=False, stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True)
                  qemu_supports_kvm = 'kvm' in (accel_result.stdout + accel_result.stderr).lower()
          qemu_usable = qemu_available and qemu_version != ''
          kvm_path = Path('/dev/kvm')
          kvm_available = kvm_path.exists() and os.access(kvm_path, os.R_OK | os.W_OK)
          supported_tuple = os.environ['INPUT_SUPPORTED_TUPLE']
          release = os.uname().release
          expected_release = release_prefix(supported_tuple)
          config_bytes = kernel_config_bytes(release)
          config_sha256 = hashlib.sha256(config_bytes).hexdigest() if config_bytes else ''
          btf_available = Path('/sys/kernel/btf/vmlinux').is_file()
          sched_ext_available = (Path('/sys/kernel') / 'sched_ext').exists()
          reviewer_signal = load_reviewer_signal(reviewer_evidence, run_url)
          unavailable = []
          if reviewer_signal['reviewer_status'] != 'approved':
              unavailable.append('protected environment reviewer approval not normalized for this run; protected-environment-review artifact required for PASS')
          if not qemu_available:
              unavailable.append('qemu-system-x86_64 unavailable on protected runner')
          if not kvm_available:
              unavailable.append('/dev/kvm unavailable or not readable/writable by protected runner')
          if qemu_available and qemu_version == '':
              unavailable.append('qemu-system-x86_64 version unavailable')
          if qemu_usable and not qemu_supports_kvm:
              unavailable.append('qemu-system-x86_64 does not expose kvm accel support')
          if expected_release == '' or not release.startswith(expected_release):
              unavailable.append('kernel release does not match supported tuple')
          if config_sha256 == '' or config_sha256 == '0' * 64:
              unavailable.append('kernel config metadata unavailable or placeholder')
              config_sha256 = '0' * 64
          if not btf_available:
              unavailable.append('kernel BTF metadata unavailable')
          if not sched_ext_available:
              unavailable.append('sched_ext kernel substrate unavailable')
          if bpf_role != 'bpf-metadata':
              unavailable.append('BPF object metadata unavailable; using explicit SKIP JSON')
          outcome = 'PASS' if not unavailable else 'SKIP'
          qemu = {
              'path': qemu_abs.lstrip('/') if qemu_available else 'usr/bin/qemu-system-x86_64',
              'version': qemu_version if qemu_usable else 'unavailable',
              'status': 'available' if qemu_usable else 'unavailable',
          }
          if qemu['status'] == 'unavailable':
              qemu['unavailable_reason'] = qemu_unavailable_reason
          dev_kvm = {
              'path': 'dev/kvm',
              'status': 'available' if kvm_available else 'unavailable',
          }
          if dev_kvm['status'] == 'unavailable':
              dev_kvm['unavailable_reason'] = '/dev/kvm not present or not readable/writable by protected runner'
          bpf_metadata = {
              'path': bpf_path.as_posix(),
              'sha256': digest(bpf_path),
              'schema_role': bpf_role,
          }
          if bpf_role == 'bpf-skip-json':
              bpf_metadata['unavailable_reason'] = 'BPF object metadata unavailable; using explicit SKIP JSON'
          protected_review = {
              'path': reviewer_evidence.as_posix(),
              'sha256': digest(reviewer_evidence),
              'schema_role': 'protected-environment-review',
          }
          runner_group = os.environ.get('RUNNER_GROUP_NAME', 'configured-by-repository-owners')
          runner_name = os.environ.get('RUNNER_NAME', 'github-actions-runner')
          runner_os = os.environ.get('RUNNER_OS', 'Linux')
          runner_arch = os.environ.get('RUNNER_ARCH', 'X64')
          reviewer_status = reviewer_signal['reviewer_status']
          reviewer_identity = reviewer_signal['reviewer_identity'] if reviewer_status == 'approved' else 'unavailable'
          reviewer_unavailable_reason = reviewer_signal['unavailable_reason'] if reviewer_status != 'approved' else 'unavailable'
          accel_mode = 'kvm' if qemu_usable and kvm_available and qemu_supports_kvm else 'unavailable'
          attestation_verify_command = 'gh attestation verify ' + os.environ['VM_PROOF_BUNDLE'] + ' --repo ' + os.environ['GITHUB_REPOSITORY']
          proof = {
              'schema': 'zig-scheduler/runner-substrate-proof/v1',
              'proof_outcome': outcome,
              'runner': {
                  'class': 'self-hosted',
                  'group': runner_group,
                  'labels': ['self-hosted', 'zig-scheduler-vm-proof', 'disposable-vm'],
                  'name': runner_name,
                  'os': runner_os,
                  'arch': runner_arch,
              },
              'protected_environment': {
                  'name': 'vm-proof-manual',
                  'protected': True,
                  'required_reviewers': 'configured-by-repository-owners',
                  'reviewer_status': reviewer_status,
                  'reviewer_identity': reviewer_identity,
                  'unavailable_reason': reviewer_unavailable_reason,
                  'run_url': run_url,
              },
              'protected_review': protected_review,
              'qemu': qemu,
              'dev_kvm': dev_kvm,
              'accel_mode': accel_mode,
              'kernel_tuple': {
                  'supported_tuple': supported_tuple,
                  'release': release,
                  'arch': 'x86_64',
                  'config_sha256': config_sha256,
                  'btf_available': btf_available,
                  'sched_ext_available': sched_ext_available,
              },
              'bpf_metadata': bpf_metadata,
              'attestation': {
                  'capability': 'available',
                  'status': 'pending-post-run-github-attestation',
                  'workflow_uses': 'actions/attest-build-provenance@v2',
                  'verify_command': attestation_verify_command,
              },
              'unavailable_reasons': unavailable,
              'host_mutation': False,
              'release_eligible': False,
              'production_capacity_claim': False,
          }
          out.write_text(json.dumps(proof, indent=2, sort_keys=True) + '\n')
          PY
          python3 qa/runner_substrate_proof_check.py \
            --proof evidence/lab/manual-vm-proof/runner-substrate-proof.json \
            --schema schemas/control/runner-substrate-proof.v1.schema.json

      - name: Capture protected runner cleanliness proof
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import hashlib
          import json
          import os

          out = Path('evidence/lab/manual-vm-proof/runner-cleanliness-proof.json')
          protected_review = Path('evidence/lab/manual-vm-proof/protected-environment-review.json')
          runner_substrate = Path('evidence/lab/manual-vm-proof/runner-substrate-proof.json')
          run_url = os.environ.get('GITHUB_SERVER_URL', 'https://github.com') + '/' + os.environ['GITHUB_REPOSITORY'] + '/actions/runs/' + os.environ['GITHUB_RUN_ID']

          def digest(path):
              return hashlib.sha256(path.read_bytes()).hexdigest()

          def ref(path, role):
              return {'path': path.as_posix(), 'sha256': digest(path), 'schema_role': role}

          def first_existing_env(*names):
              for name in names:
                  value = os.environ.get(name, '')
                  if value != '':
                      return value
              return ''

          runner_name = os.environ.get('RUNNER_NAME', 'github-actions-runner')
          runner_group = os.environ.get('RUNNER_GROUP_NAME', 'configured-by-repository-owners')
          labels = ['self-hosted', 'zig-scheduler-vm-proof', 'disposable-vm']
          jit_hash = first_existing_env('ZIGSCHED_JIT_CONFIG_SHA256', 'ACTIONS_RUNNER_JIT_CONFIG_SHA256')
          ephemeral_id = first_existing_env('ZIGSCHED_EPHEMERAL_INSTANCE_ID', 'RUNNER_TRACKING_ID')
          boot_id_path = Path('/proc/sys/kernel/random/boot_id')
          boot_id = boot_id_path.read_text().strip() if boot_id_path.is_file() else 'unavailable'
          if len(jit_hash) == 64 and all(item in '0123456789abcdef' for item in jit_hash):
              cleanliness_mode = {'kind': 'jit', 'jit_config_sha256': jit_hash}
          elif ephemeral_id != '':
              cleanliness_mode = {'kind': 'ephemeral', 'ephemeral_instance_id': ephemeral_id}
          else:
              cleanliness_mode = {'kind': 'clean_machine', 'clean_machine_boot_id': boot_id}
          previous_runner_id = os.environ.get('ZIGSCHED_PREVIOUS_RUNNER_ID', 'unavailable')
          current_runner_id = first_existing_env('ZIGSCHED_CURRENT_RUNNER_ID', 'RUNNER_TRACKING_ID')
          if current_runner_id == '':
              current_runner_id = runner_name + '-' + os.environ['GITHUB_RUN_ID']
          no_reuse_claim = os.environ.get('ZIGSCHED_NO_REUSE_EVIDENCE', '')
          no_reuse_status = 'PASS' if no_reuse_claim != '' and previous_runner_id != current_runner_id else 'REFUSE'
          no_reuse_evidence = no_reuse_claim if no_reuse_claim != '' else 'runner labels are not cleanliness proof; provide ZIGSCHED_NO_REUSE_EVIDENCE from runner registration logs'
          receipt_env = os.environ.get('ZIGSCHED_RUNNER_REMOVAL_RECEIPT', '')
          receipt_path = Path(receipt_env) if receipt_env != '' else Path('')
          removal_receipt = {'status': 'unavailable'}
          if receipt_env != '' and receipt_path.is_file():
              local_receipt = Path('evidence/lab/manual-vm-proof/runner-removal-receipt.txt')
              local_receipt.write_bytes(receipt_path.read_bytes())
              removal_receipt = {
                  'status': 'removed',
                  'removed_at': os.environ.get('ZIGSCHED_RUNNER_REMOVED_AT', '1970-01-01T00:00:00Z'),
                  'receipt_path': local_receipt.as_posix(),
                  'sha256': digest(local_receipt),
              }
          outcome = 'PASS' if no_reuse_status == 'PASS' and removal_receipt['status'] == 'removed' else 'SKIP'
          proof = {
              'schema': 'zig-scheduler/runner-cleanliness-proof/v1',
              'proof_outcome': outcome,
              'run_url': run_url,
              'runner_identity': {
                  'name': runner_name,
                  'group': runner_group,
                  'labels': labels,
              },
              'cleanliness_mode': cleanliness_mode,
              'no_reuse_evidence': {
                  'status': no_reuse_status,
                  'previous_runner_id': previous_runner_id,
                  'current_runner_id': current_runner_id,
                  'evidence': no_reuse_evidence,
              },
              'removal_receipt': removal_receipt,
              'protected_review': ref(protected_review, 'protected-environment-review'),
              'runner_substrate': ref(runner_substrate, 'runner-substrate-proof'),
              'host_mutation': False,
              'release_eligible': False,
              'production_capacity_claim': False,
          }
          out.write_text(json.dumps(proof, indent=2, sort_keys=True) + '\n')
          PY
          python3 qa/runner_cleanliness_proof_check.py \
            --proof evidence/lab/manual-vm-proof/runner-cleanliness-proof.json

      - name: Create and validate evidence manifest
        env:
          INPUT_AUDIT_ID: ${{ inputs.audit_id }}
          INPUT_ROLLBACK_ID: ${{ inputs.rollback_id }}
          INPUT_SUPPORTED_TUPLE: ${{ inputs.supported_tuple }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import hashlib
          import json
          import os
          root = Path('evidence/lab/matrix/manual-vm-proof')
          out = Path('evidence/lab/manual-vm-proof/evidence-manifest.json')
          def digest(path):
              return hashlib.sha256(path.read_bytes()).hexdigest()
          def ref(path, role):
              return {'path': path.as_posix(), 'sha256': digest(path), 'schema_role': role}
          bpf_meta = Path('zig-out/bpf/zigsched_minimal.bpf.meta.json')
          bpf_skip = Path('zig-out/bpf/zigsched_minimal.bpf.skip.json')
          bpf_ref = ref(bpf_meta, 'bpf-metadata') if bpf_meta.exists() else ref(bpf_skip, 'bpf-skip-json')
          artifacts = []
          protected_review = Path('evidence/lab/manual-vm-proof/protected-environment-review.json')
          artifacts.append(ref(protected_review, 'protected-environment-review'))
          for row in sorted((root / 'rows').glob('*/matrix-run.json')):
              row_dir = row.parent
              artifacts.append(ref(row, 'matrix-row'))
              artifacts.append(ref(row_dir / 'rollback-proof.json', 'rollback-proof'))
              artifacts.append(ref(row_dir / 'cleanup-proof.json', 'cleanup-proof'))
              artifacts.append(ref(row_dir / 'host-refusal.json', 'host-refusal-proof'))
              artifacts.append(ref(row_dir / 'privacy-scan.json', 'privacy-scan'))
          for log in sorted(Path('evidence/lab/manual-vm-proof/static-logs').glob('*.log')):
              artifacts.append(ref(log, 'static-verification-log'))
          for row_log in sorted((root / 'rows').glob('*/*.txt')):
              artifacts.append(ref(row_log, 'static-verification-log'))
          runner_substrate = Path('evidence/lab/manual-vm-proof/runner-substrate-proof.json')
          runner_cleanliness = Path('evidence/lab/manual-vm-proof/runner-cleanliness-proof.json')
          matrix_manifest = json.loads((root / 'manifest.json').read_text())
          matrix_outcomes = []
          marker_values = []
          row_outcomes = {}
          row_reasons = {}
          for entry in matrix_manifest.get('rows', []):
              scenario_id = str(entry.get('scenario_id', ''))
              outcome = str(entry.get('outcome', ''))
              reason = str(entry.get('reason', ''))
              if scenario_id == '' or outcome == '':
                  raise SystemExit('matrix manifest rows must include scenario_id and outcome')
              if scenario_id in row_outcomes:
                  raise SystemExit('matrix manifest rows must not duplicate protected-core scenarios')
              row_outcomes[scenario_id] = outcome
              row_reasons[scenario_id] = reason
              matrix_outcomes.append(outcome)
              artifact_path = Path(str(entry.get('artifact_path', '')))
              if artifact_path.is_file():
                  row_data = json.loads(artifact_path.read_text())
                  marker = row_data.get('vm_marker', {})
                  if isinstance(marker, dict) and isinstance(marker.get('present'), bool):
                      marker_values.append(marker['present'])
          required_rows = {'live-backend', 'workload-cpu-saturation', 'workload-cgroup-weight-quota'}
          latency_or_churn_rows = {'workload-interactive-latency', 'workload-scheduler-affinity-churn'}
          actual_rows = set(row_outcomes)
          selected_latency_rows = actual_rows & latency_or_churn_rows
          if not required_rows.issubset(actual_rows):
              raise SystemExit('protected-core suite is missing a required row')
          if len(selected_latency_rows) != 1:
              raise SystemExit('protected-core suite requires exactly one latency/churn row')
          if actual_rows != required_rows | selected_latency_rows:
              raise SystemExit('protected-core suite packaged unexpected row(s)')
          for scenario_id, outcome in row_outcomes.items():
              if outcome != 'PASS' and row_reasons.get(scenario_id, '') == '':
                  raise SystemExit('non-PASS protected-core row must include an explicit reason')
          protected_core_pass = all(row_outcomes[item] == 'PASS' for item in required_rows | selected_latency_rows)
          if not matrix_outcomes:
              raise SystemExit('matrix manifest rows must include at least one outcome')
          runner_data = json.loads(runner_substrate.read_text())
          cleanliness_data = json.loads(runner_cleanliness.read_text())
          runner_outcome = str(runner_data.get('proof_outcome', ''))
          cleanliness_outcome = str(cleanliness_data.get('proof_outcome', ''))
          if runner_outcome not in {'PASS', 'SKIP', 'REFUSE'}:
              raise SystemExit('runner_substrate_proof outcome is missing or unsupported')
          if cleanliness_outcome not in {'PASS', 'SKIP', 'REFUSE'}:
              raise SystemExit('runner_cleanliness_proof outcome is missing or unsupported')
          if runner_outcome != 'PASS':
              manifest_outcome = runner_outcome
          elif cleanliness_outcome != 'PASS':
              manifest_outcome = cleanliness_outcome
          elif 'REFUSE' in matrix_outcomes:
              manifest_outcome = 'REFUSE'
          elif 'SKIP' in matrix_outcomes:
              manifest_outcome = 'SKIP'
          elif any(item in {'FAIL', 'INCIDENT', 'BLOCKED'} for item in matrix_outcomes):
              manifest_outcome = 'BLOCKED'
          elif protected_core_pass:
              manifest_outcome = 'PASS'
          else:
              raise SystemExit('matrix manifest rows contain unsupported outcome values')
          marker_present = any(marker_values) if manifest_outcome != 'PASS' else bool(marker_values) and all(marker_values)
          benchmarks = []
          for spec_path in sorted((root / 'rows').glob('*/workload-spec.json')):
              spec = json.loads(spec_path.read_text())
              for entry in spec.get('benchmark_provenance', []):
                  benchmarks.append(ref(Path(entry['record_path']), 'benchmark-provenance'))
          if benchmarks:
              benchmark_provenance = benchmarks
          elif manifest_outcome == 'PASS':
              raise SystemExit('PASS evidence manifest requires benchmark_provenance records')
          else:
              benchmark_provenance = {
                  'status': 'not_applicable',
                  'reason': 'manual VM proof outcome did not reach calibrated benchmark artifact production',
                  'applies_to_outcomes': ['SKIP', 'REFUSE', 'BLOCKED'],
              }
          manifest = {
              'schema': 'zig-scheduler/evidence-manifest/v1',
              'outcome': manifest_outcome,
              'audit_id': os.environ['INPUT_AUDIT_ID'],
              'rollback_id': os.environ['INPUT_ROLLBACK_ID'],
              'vm_marker': {'path': '/run/zig-scheduler-vm-lab.marker', 'present': marker_present, 'checked_by': 'manual-vm-proof'},
              'supported_tuple': os.environ['INPUT_SUPPORTED_TUPLE'],
              'bpf_metadata_or_skip': bpf_ref,
              'matrix_manifest': ref(root / 'manifest.json', 'matrix-manifest'),
              'daemon_events': ref(root / 'daemon-events.jsonl', 'daemon-events'),
              'runner_substrate': ref(runner_substrate, 'runner-substrate-proof'),
              'runner_cleanliness': ref(runner_cleanliness, 'runner-cleanliness-proof'),
              'artifacts': artifacts,
              'benchmark_provenance': benchmark_provenance,
              'privacy_scan': {'status': 'PASS', 'private_fields_found': False, 'artifact_paths': [item['path'] for item in artifacts]},
              'attestation': {'status': 'pending-post-run-github-attestation', 'workflow_uses': 'actions/attest-build-provenance@v2', 'verify_command': 'gh attestation verify ' + os.environ['VM_PROOF_BUNDLE'] + ' --repo ' + os.environ['GITHUB_REPOSITORY'], 'retention_days': 30},
              'required_sources': ['.github/workflows/manual-vm-proof.yml', 'qa/protected_environment_review_check.py', 'qa/evidence_manifest_check.py', 'qa/evidence_manifest_selftest.py', 'qa/manual_vm_proof_ci_check.py', 'qa/manual_vm_proof_flow.py', 'qa/runner_substrate_proof_check.py', 'qa/runner_substrate_proof_common.py', 'qa/runner_substrate_proof_selftest.py', 'qa/runner_cleanliness_proof_check.py', 'qa/matrix_run_contract_check.py', 'schemas/control/protected-environment-review.v1.schema.json', 'schemas/control/evidence-manifest.v1.schema.json', 'schemas/control/runner-substrate-proof.v1.schema.json', 'schemas/control/runner-cleanliness-proof.v1.schema.json'],
              'host_mutation': False,
              'release_eligible': False,
              'production_capacity_claim': False,
          }
          out.write_text(json.dumps(manifest, indent=2, sort_keys=True) + '\n')
          PY
          python3 qa/evidence_manifest_check.py \
            --manifest evidence/lab/manual-vm-proof/evidence-manifest.json \
            --schema schemas/control/evidence-manifest.v1.schema.json

      - name: Create GitHub Actions proof artifact tarball
        run: |
          set -euo pipefail
          test -f evidence/lab/manual-vm-proof/evidence-manifest.json
          mkdir -p "$(dirname "$VM_PROOF_BUNDLE")"
          tar_inputs=(evidence/lab/manual-vm-proof evidence/lab/matrix/manual-vm-proof schemas/control/protected-environment-review.v1.schema.json schemas/control/evidence-manifest.v1.schema.json schemas/control/runner-substrate-proof.v1.schema.json schemas/control/runner-cleanliness-proof.v1.schema.json)
          if [ -f zig-out/bpf/zigsched_minimal.bpf.meta.json ]; then
            tar_inputs+=(zig-out/bpf/zigsched_minimal.bpf.meta.json)
          fi
          if [ -f zig-out/bpf/zigsched_minimal.bpf.skip.json ]; then
            tar_inputs+=(zig-out/bpf/zigsched_minimal.bpf.skip.json)
          fi
          tar --zstd -cf "$VM_PROOF_BUNDLE" "${tar_inputs[@]}" \
            2>/tmp/vm-proof-tar.err || { cat /tmp/vm-proof-tar.err >&2; exit 1; }

      - name: Upload VM proof bundle workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: vm-proof-bundle
          path: evidence/lab/manual-vm-proof-bundle/vm-proof-bundle.tar.zst
          if-no-files-found: error
          retention-days: 30

      - name: Attest VM proof bundle
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: evidence/lab/manual-vm-proof-bundle/vm-proof-bundle.tar.zst

      - name: Print attestation verification command
        env:
          GITHUB_REPOSITORY_NAME: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "After the run completes, verify provenance with:"
          echo "gh attestation verify $VM_PROOF_BUNDLE --repo $GITHUB_REPOSITORY_NAME"
          echo "This workflow artifact is not a release asset, not OCI, and not production approval."
